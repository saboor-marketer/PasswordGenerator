<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="password-generator">
            <h1 class="text-center mb-4">Password Generator</h1>
            
            <!-- Password Display Box -->
            <div class="password-display mb-4">
                <div class="input-group">
                    <input type="text" class="form-control password-input" id="passwordOutput" readonly placeholder="Click Generate">
                    <button class="btn btn-outline-secondary copy-btn" id="copyBtn" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-clipboard" viewBox="0 0 16 16">
                            <path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/>
                            <path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0h-3z"/>
                        </svg>
                        Copy
                    </button>
                </div>
            </div>

            <!-- Password Strength Indicator -->
            <div class="strength-meter mb-4">
                <label class="form-label">Password Strength:</label>
                <div class="progress">
                    <div class="progress-bar" id="strengthBar" role="progressbar" style="width: 0%"></div>
                </div>
                <small class="text-muted" id="strengthText">No password generated</small>
            </div>

            <!-- Length Slider -->
            <div class="length-control mb-4">
                <label for="lengthSlider" class="form-label">
                    Password Length: <span id="lengthValue">12</span>
                </label>
                <input type="range" class="form-range" id="lengthSlider" min="6" max="32" value="12">
                <div class="length-labels">
                    <span>6</span>
                    <span>32</span>
                </div>
            </div>

            <!-- Character Type Checkboxes -->
            <div class="character-options mb-4">
                <label class="form-label d-block mb-3">Include:</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="uppercase" checked>
                    <label class="form-check-label" for="uppercase">
                        Uppercase Letters (A-Z)
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="lowercase" checked>
                    <label class="form-check-label" for="lowercase">
                        Lowercase Letters (a-z)
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="numbers" checked>
                    <label class="form-check-label" for="numbers">
                        Numbers (0-9)
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="symbols" checked>
                    <label class="form-check-label" for="symbols">
                        Special Characters (!@#$%^&*)
                    </label>
                </div>
            </div>

            <!-- Generate Button -->
            <button class="btn btn-primary generate-btn w-100" id="generateBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-lightning-charge me-2" viewBox="0 0 16 16">
                    <path d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"/>
                </svg>
                Generate Password
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
